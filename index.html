<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Love Dashboard</title>
<style>
:root {
  --pink: #e91e63;
  --pink-light: #fce4ec;
  --blue: #2196F3;
  --blue-light: #e3f2fd;
  --bg: #fafafa;
  --card: #fff;
  --text: #333;
  --text-light: #888;
  --shadow: 0 2px 12px rgba(0,0,0,.08);
  --radius: 16px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: linear-gradient(135deg, #fce4ec 0%, #e3f2fd 50%, #f3e5f5 100%);
  min-height: 100vh;
  color: var(--text);
}
/* Header */
.header {
  background: linear-gradient(135deg, #e91e63, #ad1457);
  color: #fff;
  padding: 24px 20px;
  text-align: center;
  box-shadow: 0 4px 20px rgba(233,30,99,.3);
}
.header h1 { font-size: 2em; margin-bottom: 8px; }
.counter {
  font-size: 1.3em;
  font-weight: 300;
  letter-spacing: 1px;
  font-variant-numeric: tabular-nums;
  font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
}
.counter span { font-weight: 700; }
/* Settings btn */
.settings-btn {
  position: fixed; top: 20px; right: 20px;
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(255,255,255,.2); border: none; color: #fff;
  font-size: 1.4em; cursor: pointer; z-index: 100;
  backdrop-filter: blur(10px);
  transition: transform .3s;
}
.settings-btn:hover { transform: rotate(90deg); }
/* Main grid */
.container {
  max-width: 1200px; margin: 0 auto; padding: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
  gap: 20px;
}
/* Cards */
.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: var(--shadow);
  transition: transform .2s, box-shadow .2s;
}
.card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.12); }
.card h2 {
  font-size: 1.1em; margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}
.card h2 .icon { font-size: 1.3em; }
/* Weather */
.weather-main {
  display: flex; align-items: center; gap: 16px; margin-bottom: 12px;
}
.weather-temp { font-size: 3em; font-weight: 300; line-height: 1; }
.weather-desc { color: var(--text-light); font-size: .95em; }
.weather-detail { display: flex; gap: 20px; margin-top: 8px; color: var(--text-light); font-size: .9em; }
.clothing { margin-top: 12px; padding: 10px 14px; background: #fff3e0; border-radius: 10px; font-size: .9em; }
.city-input { display:flex; gap:8px; margin-top:8px; }
.city-input input { flex:1; padding:8px 12px; border:1px solid #ddd; border-radius:8px; font-size:.9em; }
.city-input button { padding:8px 16px; background:var(--pink); color:#fff; border:none; border-radius:8px; cursor:pointer; font-size:.9em; }
/* Weight/BMI */
.weight-row { display:flex; gap:12px; flex-wrap:wrap; }
.weight-person { flex:1; min-width:140px; padding:14px; border-radius:12px; }
.weight-person.male { background:var(--blue-light); }
.weight-person.female { background:var(--pink-light); }
.weight-person .name { font-weight:700; font-size:.95em; margin-bottom:6px; }
.weight-person.male .name { color:var(--blue); }
.weight-person.female .name { color:var(--pink); }
.weight-person .val { font-size:.85em; color:var(--text-light); }
.weight-person .bmi { font-size:1.5em; font-weight:700; margin-top:4px; }
.weight-person.male .bmi { color:var(--blue); }
.weight-person.female .bmi { color:var(--pink); }
.bmi-label { font-size:.75em; color:var(--text-light); }
/* Period */
.period-status { padding:12px 16px; border-radius:10px; margin-bottom:12px; font-size:.95em; }
.period-status.active { background:#ffebee; color:#c62828; }
.period-status.upcoming { background:#fff3e0; color:#e65100; }
.period-status.safe { background:#e8f5e9; color:#2e7d32; }
.period-dates { font-size:.85em; color:var(--text-light); margin-bottom:8px; }
.period-history { margin-top:12px; }
.period-history h3 { font-size:.9em; margin-bottom:6px; color:var(--text-light); }
.period-item { font-size:.85em; padding:4px 0; display:flex; justify-content:space-between; }
/* Messages */
.messages-list { max-height:200px; overflow-y:auto; margin-bottom:12px; }
.msg-item { padding:8px 12px; border-radius:8px; margin-bottom:6px; font-size:.9em; }
.msg-item.male { background:var(--blue-light); }
.msg-item.female { background:var(--pink-light); }
.msg-item .author { font-size:.75em; color:var(--text-light); margin-bottom:2px; }
.msg-input { display:flex; gap:8px; }
.msg-input select { padding:8px; border:1px solid #ddd; border-radius:8px; }
.msg-input input { flex:1; padding:8px 12px; border:1px solid #ddd; border-radius:8px; font-size:.9em; }
.msg-input button { padding:8px 16px; background:var(--pink); color:#fff; border:none; border-radius:8px; cursor:pointer; }
/* Todos */
.todo-list { max-height:280px; overflow-y:auto; margin-bottom:12px; }
.todo-item { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid #f0f0f0; }
.todo-item .dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.todo-item .dot.male { background:var(--blue); }
.todo-item .dot.female { background:var(--pink); }
.todo-item .txt { flex:1; font-size:.9em; }
.todo-item.done .txt { text-decoration:line-through; color:#bbb; }
.todo-item input[type=checkbox] { width:18px; height:18px; cursor:pointer; }
.todo-item .del { background:none; border:none; color:#ccc; cursor:pointer; font-size:1.1em; padding:2px 6px; }
.todo-item .del:hover { color:#e53935; }
.todo-input { display:flex; gap:8px; }
.todo-input select { padding:8px; border:1px solid #ddd; border-radius:8px; }
.todo-input input { flex:1; padding:8px 12px; border:1px solid #ddd; border-radius:8px; }
.todo-input button { padding:8px 16px; background:var(--pink); color:#fff; border:none; border-radius:8px; cursor:pointer; }
/* Modal */
.modal-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.5); z-index:200;
  justify-content:center; align-items:center;
}
.modal-overlay.show { display:flex; }
.modal {
  background:#fff; border-radius:var(--radius); padding:32px;
  max-width:440px; width:90%; max-height:85vh; overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.3);
}
.modal h2 { margin-bottom:20px; }
.form-group { margin-bottom:14px; }
.form-group label { display:block; font-size:.85em; color:var(--text-light); margin-bottom:4px; font-weight:600; }
.form-group input { width:100%; padding:10px 12px; border:1px solid #ddd; border-radius:8px; font-size:.95em; }
.modal button[type=submit] {
  width:100%; padding:12px; background:var(--pink); color:#fff;
  border:none; border-radius:8px; font-size:1em; cursor:pointer; margin-top:8px;
}
.modal .close {
  float:right; background:none; border:none; font-size:1.5em;
  cursor:pointer; color:#999; line-height:1;
}
/* Scrollbar */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-thumb { background:#ddd; border-radius:3px; }
/* Responsive */
@media (max-width:768px) {
  .header h1 { font-size:1.4em; }
  .counter { font-size:1em; }
  .container { grid-template-columns:1fr; padding:12px; gap:12px; }
  .card { padding:16px; }
}
/* Animations */
@keyframes fadeIn {
  from { opacity:0; transform:translateY(10px); }
  to { opacity:1; transform:translateY(0); }
}
.card { animation: fadeIn .5s ease forwards; }
.card:nth-child(1) { animation-delay:0s; }
.card:nth-child(2) { animation-delay:.1s; }
.card:nth-child(3) { animation-delay:.2s; }
.card:nth-child(4) { animation-delay:.3s; }
.card:nth-child(5) { animation-delay:.4s; }
/* Hearts background */
.hearts { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:-1; }
.heart { position:absolute; animation:float 6s ease-in-out infinite; opacity:.15; font-size:2em; }
@keyframes float {
  0%,100% { transform:translateY(0) rotate(0deg); }
  50% { transform:translateY(-30px) rotate(10deg); }
}
</style>
</head>
<body>

<div class="hearts" id="hearts"></div>

<button class="settings-btn" onclick="openSettings()" title="设置">⚙</button>

<div class="header">
  <h1>💕 <span id="titleText">Our Love</span></h1>
  <div class="counter" id="counter">加载中...</div>
</div>

<div class="container">
  <!-- Weather Card -->
  <div class="card" id="weatherCard">
    <h2><span class="icon">🌤</span> 今日天气</h2>
    <div id="weatherContent">
      <div class="city-input">
        <input type="text" id="cityInput" placeholder="输入城市名称，如：北京">
        <button onclick="fetchWeatherByCity()">查询</button>
      </div>
      <div style="color:var(--text-light);font-size:.85em;margin-top:8px;">正在获取位置...</div>
    </div>
  </div>

  <!-- Weight & BMI Card -->
  <div class="card">
    <h2><span class="icon">⚖</span> 体重 & BMI</h2>
    <div class="weight-row" id="weightRow"></div>
    <div style="margin-top:12px; display:flex; gap:8px;">
      <input type="number" id="weightInput" placeholder="输入体重(kg)" style="flex:1;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:.9em;">
      <select id="weightPerson" style="padding:8px;border:1px solid #ddd;border-radius:8px;">
        <option value="0">我</option>
        <option value="1">女友</option>
      </select>
      <button onclick="addWeight()" style="padding:8px 16px;background:var(--pink);color:#fff;border:none;border-radius:8px;cursor:pointer;">记录</button>
    </div>
  </div>

  <!-- Period Card -->
  <div class="card">
    <h2><span class="icon">📅</span> 例假记录</h2>
    <div id="periodContent"></div>
    <div style="margin-top:12px; display:flex; gap:8px;">
      <input type="date" id="periodDate" style="flex:1;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:.9em;">
      <button onclick="addPeriod()" style="padding:8px 16px;background:var(--pink);color:#fff;border:none;border-radius:8px;cursor:pointer;">记录开始</button>
    </div>
  </div>

  <!-- Messages Card -->
  <div class="card">
    <h2><span class="icon">💬</span> 每日留言</h2>
    <div class="messages-list" id="messagesList"></div>
    <div class="msg-input">
      <select id="msgAuthor">
        <option value="0">我</option>
        <option value="1">女友</option>
      </select>
      <input type="text" id="msgInput" placeholder="写一句留言...">
      <button onclick="addMessage()">发送</button>
    </div>
  </div>

  <!-- Todo Card -->
  <div class="card">
    <h2><span class="icon">✅</span> 待办事项</h2>
    <div class="todo-list" id="todoList"></div>
    <div class="todo-input">
      <select id="todoPerson">
        <option value="0">我</option>
        <option value="1">女友</option>
      </select>
      <input type="text" id="todoInput" placeholder="添加待办...">
      <button onclick="addTodo()">添加</button>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <button class="close" onclick="closeSettings()">✕</button>
    <h2>⚙ 设置</h2>
    <form id="settingsForm" onsubmit="saveSettings(event)">
      <div class="form-group">
        <label>我的名字</label>
        <input type="text" id="setName0" required>
      </div>
      <div class="form-group">
        <label>女友的名字</label>
        <input type="text" id="setName1" required>
      </div>
      <div class="form-group">
        <label>我的身高 (cm)</label>
        <input type="number" id="setHeight0" min="100" max="250" required>
      </div>
      <div class="form-group">
        <label>女友的身高 (cm)</label>
        <input type="number" id="setHeight1" min="100" max="250" required>
      </div>
      <div class="form-group">
        <label>在一起的日子</label>
        <input type="date" id="setAnniversary" required>
      </div>
      <div class="form-group">
        <label>例假周期 (天，默认28)</label>
        <input type="number" id="setCycleDays" min="20" max="45" value="28">
      </div>
      <div class="form-group">
        <label>城市（天气）</label>
        <input type="text" id="setCity" placeholder="如：北京">
      </div>
      <button type="submit">保存设置</button>
    </form>
  </div>
</div>

<script>
// ============ DATA STORE ============
const STORAGE_KEY = 'love-dashboard-data';

function loadData() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) return JSON.parse(raw);
  return {
    names: ['我', '女友'],
    heights: [175, 165],
    anniversary: '2024-01-01',
    weights: [],       // {person:0|1, weight:number, date:string}
    periods: [],       // {date:string}
    cycleDays: 28,
    messages: [],      // {person:0|1, text:string, date:string}
    todos: [],         // {person:0|1, text:string, done:bool, id:number}
    city: '',
    todoIdCounter: 0
  };
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

let D = loadData();

function persist() { saveData(D); }

// ============ HELPERS ============
function fmtDate(d) {
  const dd = new Date(d);
  return `${dd.getFullYear()}-${String(dd.getMonth()+1).padStart(2,'0')}-${String(dd.getDate()).padStart(2,'0')}`;
}

function todayStr() { return fmtDate(new Date()); }

// ============ TIME COUNTER ============
function updateCounter() {
  const start = new Date(D.anniversary + 'T00:00:00');
  const now = new Date();
  if (isNaN(start.getTime())) {
    document.getElementById('counter').textContent = '请在设置中设置在一起的日子 💕';
    return;
  }
  let diff = Math.floor((now - start) / 1000);
  if (diff < 0) { document.getElementById('counter').textContent = '未来可期 💕'; return; }
  const sec = diff % 60; diff = Math.floor(diff / 60);
  const min = diff % 60; diff = Math.floor(diff / 60);
  const hr = diff % 24; diff = Math.floor(diff / 24);
  const day = diff;
  const years = Math.floor(day / 365);
  const remainingDays = day - years * 365;

  const dayLabel = years > 0 ? `${years}年${remainingDays}天` : `${day}天`;
  document.getElementById('counter').innerHTML =
    `在一起：<span>${dayLabel}</span> ${String(hr).padStart(2,'0')}:${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}</span>`;
}

// ============ WEATHER ============
async function fetchWeather(lat, lon) {
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto&forecast_days=1`;
    const resp = await fetch(url);
    const data = await resp.json();
    renderWeather(data, lat, lon);
  } catch(e) {
    document.getElementById('weatherContent').innerHTML = '<div style="color:#e53935;">获取天气失败，请检查网络或手动输入城市</div>';
  }
}

function getWeatherDesc(code) {
  const map = {0:'晴天 ☀️',1:'大部晴朗 🌤',2:'多云 ⛅',3:'阴天 ☁️',45:'雾 🌫',48:'雾凇 🌫',51:'小雨 🌦',53:'小雨 🌦',55:'小雨 🌦',61:'小雨 🌧',63:'中雨 🌧',65:'大雨 🌧',71:'小雪 ❄️',73:'中雪 ❄️',75:'大雪 ❄️',77:'雪粒 ❄️',80:'阵雨 🌦',81:'中阵雨 🌧',82:'大阵雨 🌧',85:'小雪 ❄️',86:'大雪 ❄️',95:'雷暴 ⛈',96:'雷暴+冰雹 ⛈',99:'雷暴+冰雹 ⛈'};
  return map[code] || `未知(${code})`;
}

function getClothing(temp, code) {
  let suggestion = '';
  if (temp < 0) suggestion = '厚羽绒服 + 围巾 + 手套 + 帽子，非常冷！';
  else if (temp < 5) suggestion = '羽绒服 + 厚毛衣 + 围巾';
  else if (temp < 10) suggestion = '厚外套 + 毛衣';
  else if (temp < 15) suggestion = '薄外套 + 长袖';
  else if (temp < 20) suggestion = '薄长袖或短袖 + 薄外套';
  else if (temp < 25) suggestion = '短袖 + 薄长裤 / 连衣裙';
  else if (temp < 30) suggestion = '短袖短裤 / 裙子，注意防晒';
  else suggestion = '轻薄透气衣物 + 防晒霜 + 遮阳伞！';
  if ([51,53,55,61,63,65,80,81,82,95,96,99].includes(code)) suggestion += ' 🌂 记得带伞！';
  return suggestion;
}

function renderWeather(data, lat, lon) {
  const cw = data.current_weather;
  const daily = data.daily;
  const temp = Math.round(cw.temperature);
  const code = cw.weathercode;
  const desc = getWeatherDesc(code);
  const cloth = getClothing(temp, code);
  const cityName = D.city || `(${lat.toFixed(1)}, ${lon.toFixed(1)})`;

  document.getElementById('weatherContent').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <span style="font-weight:700;">${cityName}</span>
      <span style="font-size:.8em;color:var(--text-light);">${fmtDate(new Date())}</span>
    </div>
    <div class="weather-main">
      <div class="weather-temp">${temp}°C</div>
      <div>
        <div class="weather-desc">${desc}</div>
        <div class="weather-detail">
          <span>💨 ${cw.windspeed} km/h</span>
          <span>🌡 H:${Math.round(daily.temperature_2m_max[0])}° L:${Math.round(daily.temperature_2m_min[0])}°</span>
        </div>
      </div>
    </div>
    <div class="clothing">👗 ${cloth}</div>
    <div class="city-input" style="margin-top:10px;">
      <input type="text" id="cityInput2" placeholder="更换城市...">
      <button onclick="fetchWeatherByCity()">查询</button>
    </div>
  `;
}

async function fetchWeatherByCity(cityName) {
  const input = document.getElementById('cityInput') || document.getElementById('cityInput2');
  const city = (cityName || input?.value || '').trim();
  if (!city) return;
  D.city = city; persist();
  // Sync all city inputs
  document.querySelectorAll('[id^="cityInput"]').forEach(el => { el.value = city; });
  try {
    const geoUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=zh`;
    const geoResp = await fetch(geoUrl);
    const geoData = await geoResp.json();
    if (geoData.results && geoData.results.length > 0) {
      const r = geoData.results[0];
      fetchWeather(r.latitude, r.longitude);
    } else {
      document.getElementById('weatherContent').innerHTML = '<div style="color:#e53935;">未找到城市，请重试</div>';
    }
  } catch(e) {
    document.getElementById('weatherContent').innerHTML = '<div style="color:#e53935;">查询失败</div>';
  }
}

function initWeather() {
  if (D.city) {
    fetchWeatherByCity(D.city);
    return;
  }
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => fetchWeather(pos.coords.latitude, pos.coords.longitude),
      () => {
        document.getElementById('weatherContent').innerHTML = `
          <div style="color:var(--text-light);font-size:.85em;margin-bottom:8px;">无法获取位置，请手动输入城市</div>
          <div class="city-input">
            <input type="text" id="cityInput" placeholder="输入城市名称，如：北京">
            <button onclick="fetchWeatherByCity()">查询</button>
          </div>`;
      }
    );
  }
}

// ============ WEIGHT & BMI ============
function calcBMI(weight, heightCm) {
  const h = heightCm / 100;
  return (weight / (h * h)).toFixed(1);
}

function bmiCategory(bmi) {
  const v = parseFloat(bmi);
  if (v < 18.5) return '偏瘦';
  if (v < 24) return '正常';
  if (v < 28) return '偏胖';
  return '肥胖';
}

function renderWeights() {
  const row = document.getElementById('weightRow');
  const latest = [null, null];
  for (let i = D.weights.length - 1; i >= 0; i--) {
    const w = D.weights[i];
    if (latest[w.person] === null) latest[w.person] = w;
  }
  const cls = ['male','female'];
  row.innerHTML = [0,1].map(p => {
    const w = latest[p];
    const name = D.names[p];
    const h = D.heights[p];
    if (!w) {
      return `<div class="weight-person ${cls[p]}"><div class="name">${name}</div><div class="val">暂无记录</div><div class="bmi">--</div></div>`;
    }
    const bmi = calcBMI(w.weight, h);
    return `<div class="weight-person ${cls[p]}">
      <div class="name">${name}</div>
      <div class="val">${w.weight} kg (${w.date})</div>
      <div class="bmi">BMI ${bmi}</div>
      <div class="bmi-label">${bmiCategory(bmi)}</div>
    </div>`;
  }).join('');
}

function addWeight() {
  const weight = parseFloat(document.getElementById('weightInput').value);
  const person = parseInt(document.getElementById('weightPerson').value);
  if (!weight || weight < 20 || weight > 300) { alert('请输入有效的体重（20-300kg）'); return; }
  D.weights.push({ person, weight, date: todayStr() });
  persist();
  renderWeights();
  document.getElementById('weightInput').value = '';
}

// ============ PERIOD TRACKER ============
function predictNext(periods, cycleDays) {
  if (periods.length === 0) return null;
  // Calculate average cycle from last few periods
  let avgCycle = cycleDays;
  if (periods.length >= 2) {
    let sum = 0, count = 0;
    for (let i = 1; i < Math.min(periods.length, 4); i++) {
      const d1 = new Date(periods[i-1].date);
      const d2 = new Date(periods[i].date);
      const diff = Math.round((d1 - d2) / (1000*60*60*24));
      if (diff > 15 && diff < 60) { sum += diff; count++; }
    }
    if (count > 0) avgCycle = Math.round(sum / count);
  }
  const lastDate = new Date(periods[0].date);
  const nextDate = new Date(lastDate);
  nextDate.setDate(nextDate.getDate() + avgCycle);
  return { date: nextDate, cycleDays: avgCycle };
}

function renderPeriod() {
  const container = document.getElementById('periodContent');
  // Sort periods descending
  D.periods.sort((a,b) => new Date(b.date) - new Date(a.date));
  const prediction = predictNext(D.periods, D.cycleDays);

  let html = '';
  const today = new Date(); today.setHours(0,0,0,0);

  // Check if currently on period (within 5 days of last start)
  let onPeriod = false;
  if (D.periods.length > 0) {
    const lastStart = new Date(D.periods[0].date);
    const daysSince = Math.floor((today - lastStart) / (1000*60*60*24));
    if (daysSince >= 0 && daysSince < 5) onPeriod = true;
  }

  if (onPeriod) {
    html += '<div class="period-status active">🔴 经期中 - 注意保暖，多喝热水</div>';
  } else if (prediction) {
    const daysUntil = Math.floor((prediction.date - today) / (1000*60*60*24));
    if (daysUntil <= 3) {
      html += `<div class="period-status upcoming">🟡 预计 ${daysUntil} 天后来例假 (${fmtDate(prediction.date)})，提前准备</div>`;
    } else {
      html += `<div class="period-status safe">🟢 安全期 · 下次预计 ${fmtDate(prediction.date)} (${daysUntil}天后) · 周期${prediction.cycleDays}天</div>`;
    }
  } else {
    html += '<div class="period-status" style="background:#f5f5f5;color:#888;">暂无例假记录，请添加</div>';
  }

  if (D.periods.length > 0) {
    html += '<div class="period-history"><h3>📋 历史记录</h3>';
    D.periods.slice(0, 6).forEach(p => {
      html += `<div class="period-item"><span>${p.date}</span><span style="color:var(--text-light);">开始</span></div>`;
    });
    html += '</div>';
  }

  container.innerHTML = html;
}

function addPeriod() {
  const date = document.getElementById('periodDate').value;
  if (!date) { alert('请选择日期'); return; }
  // Prevent duplicates
  if (D.periods.some(p => p.date === date)) { alert('该日期已记录'); return; }
  D.periods.push({ date });
  persist();
  renderPeriod();
  document.getElementById('periodDate').value = '';
}

// ============ MESSAGES ============
function renderMessages() {
  const list = document.getElementById('messagesList');
  if (D.messages.length === 0) {
    list.innerHTML = '<div style="color:#bbb;text-align:center;padding:20px;">暂无留言，快来写一句吧 💌</div>';
    return;
  }
  // Show last 20
  const msgs = D.messages.slice(-20).reverse();
  list.innerHTML = msgs.map(m => {
    const cls = m.person === 0 ? 'male' : 'female';
    return `<div class="msg-item ${cls}">
      <div class="author">${D.names[m.person]} · ${m.date}</div>
      <div>${escHtml(m.text)}</div>
    </div>`;
  }).join('');
}

function addMessage() {
  const text = document.getElementById('msgInput').value.trim();
  const person = parseInt(document.getElementById('msgAuthor').value);
  if (!text) return;
  D.messages.push({ person, text, date: todayStr() });
  persist();
  renderMessages();
  document.getElementById('msgInput').value = '';
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ============ TODOS ============
function renderTodos() {
  const list = document.getElementById('todoList');
  if (D.todos.length === 0) {
    list.innerHTML = '<div style="color:#bbb;text-align:center;padding:20px;">暂无待办事项 📝</div>';
    return;
  }
  list.innerHTML = D.todos.map(t => {
    const cls = t.person === 0 ? 'male' : 'female';
    const doneCls = t.done ? ' done' : '';
    return `<div class="todo-item${doneCls}">
      <input type="checkbox" ${t.done?'checked':''} onchange="toggleTodo(${t.id})">
      <span class="dot ${cls}"></span>
      <span class="txt">${escHtml(t.text)}</span>
      <button class="del" onclick="deleteTodo(${t.id})">✕</button>
    </div>`;
  }).join('');
}

function addTodo() {
  const text = document.getElementById('todoInput').value.trim();
  const person = parseInt(document.getElementById('todoPerson').value);
  if (!text) return;
  D.todos.push({ person, text, done: false, id: ++D.todoIdCounter });
  persist();
  renderTodos();
  document.getElementById('todoInput').value = '';
}

function toggleTodo(id) {
  const t = D.todos.find(x => x.id === id);
  if (t) { t.done = !t.done; persist(); renderTodos(); }
}

function deleteTodo(id) {
  D.todos = D.todos.filter(x => x.id !== id);
  persist();
  renderTodos();
}

// ============ SETTINGS ============
function openSettings() {
  document.getElementById('setName0').value = D.names[0];
  document.getElementById('setName1').value = D.names[1];
  document.getElementById('setHeight0').value = D.heights[0];
  document.getElementById('setHeight1').value = D.heights[1];
  document.getElementById('setAnniversary').value = D.anniversary;
  document.getElementById('setCycleDays').value = D.cycleDays;
  document.getElementById('setCity').value = D.city;
  document.getElementById('settingsModal').classList.add('show');
}

function closeSettings() {
  document.getElementById('settingsModal').classList.remove('show');
}

function saveSettings(e) {
  e.preventDefault();
  D.names[0] = document.getElementById('setName0').value.trim() || '我';
  D.names[1] = document.getElementById('setName1').value.trim() || '女友';
  D.heights[0] = parseInt(document.getElementById('setHeight0').value) || 175;
  D.heights[1] = parseInt(document.getElementById('setHeight1').value) || 165;
  D.anniversary = document.getElementById('setAnniversary').value;
  D.cycleDays = parseInt(document.getElementById('setCycleDays').value) || 28;
  const newCity = document.getElementById('setCity').value.trim();
  if (newCity !== D.city) { D.city = newCity; }
  persist();
  closeSettings();
  // Refresh all
  updateCounter();
  document.getElementById('titleText').textContent = D.names[0] + ' ❤ ' + D.names[1];
  renderWeights();
  renderMessages();
  renderTodos();
  if (D.city) fetchWeatherByCity(D.city);
}

// ============ FLOATING HEARTS ============
function initHearts() {
  const container = document.getElementById('hearts');
  const hearts = ['💕','💖','💗','💝','💘','❤️','💓'];
  for (let i = 0; i < 12; i++) {
    const span = document.createElement('span');
    span.className = 'heart';
    span.textContent = hearts[Math.floor(Math.random()*hearts.length)];
    span.style.left = Math.random()*100+'%';
    span.style.top = Math.random()*100+'%';
    span.style.animationDelay = Math.random()*6+'s';
    span.style.animationDuration = (4+Math.random()*8)+'s';
    span.style.fontSize = (1+Math.random()*2)+'em';
    container.appendChild(span);
  }
}

// ============ INIT ============
function init() {
  document.getElementById('titleText').textContent = D.names[0] + ' ❤ ' + D.names[1];
  updateCounter();
  setInterval(updateCounter, 1000);
  initWeather();
  renderWeights();
  renderPeriod();
  renderMessages();
  renderTodos();
  initHearts();
  // Set default date inputs to today
  document.getElementById('periodDate').value = todayStr();
}

// Keyboard submit
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.activeElement === document.getElementById('msgInput')) addMessage();
    else if (document.activeElement === document.getElementById('todoInput')) addTodo();
  }
});

// Close modal on overlay click
document.getElementById('settingsModal').addEventListener('click', function(e) {
  if (e.target === this) closeSettings();
});

init();
</script>
