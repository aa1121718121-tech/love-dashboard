<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Love Story · 我们的点点滴滴</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Love Story">
<meta name="theme-color" content="#1a1a2e">
<meta name="description" content="情侣专属看板">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<style>
:root {
  --bg: #1a1a2e;
  --card-bg: #1e1e36;
  --pink: #e91e63;
  --pink-light: #f8bbd0;
  --blue: #4fc3f7;
  --blue-light: #b3e5fc;
  --text: #eee;
  --text-light: #aaa;
  --text-lighter: #777;
  --radius: 20px;
  --radius-sm: 14px;
  --nav-h: 68px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background: url('bg.jpg') center/cover no-repeat;
  opacity: .25;
  z-index: -1;
}
.app {
  width: 100%; max-width: 480px;
  padding: 0 16px calc(var(--nav-h) + 20px);
  position: relative; overflow-x: hidden;
}

/* ===== STARS ===== */
.stars { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
.star { position:absolute; background:#fff; border-radius:50%; animation:twinkle 2s ease-in-out infinite; }
@keyframes twinkle { 0%,100%{opacity:.3;} 50%{opacity:1;} }

/* ===== HEADER ===== */
.header-bar {
  position: sticky; top: 0; z-index: 50;
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 0 12px;
  background: var(--bg);
}
.header-bar .title { font-size: 1.2em; font-weight: 700; }
.header-bar .title .pink { color: var(--pink); }
.header-bar .settings-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.1);
  color: #fff; font-size: 1.1em; cursor: pointer; display: flex;
  align-items: center; justify-content: center; transition: transform .3s;
}
.header-bar .settings-btn:active { transform: rotate(90deg); }

/* ===== HERO (only on home tab) ===== */
.hero { display: none; position: relative; text-align: center; padding: 10px 0 20px; }
.hero.show { display: block; }
.hero-moon {
  position: absolute; top: 0; right: 20px;
  width: 44px; height: 44px;
  background: radial-gradient(circle at 35% 35%, #fff9c4, #ffcc80);
  border-radius: 50%;
  box-shadow: 0 0 30px #ffcc8055, 0 0 60px #ffcc8033;
}
.hero-avatars { position: relative; width: 160px; height: 120px; margin: 0 auto 12px; }
.hero-avatar {
  position: absolute; bottom: 0; font-size: 60px;
  animation: bounce 2.5s ease-in-out infinite;
}
.hero-avatar.left { left: 5px; }
.hero-avatar.right { right: 5px; animation-delay: .3s; }
@keyframes bounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }
.hero-heart {
  position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
  font-size: 22px; animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{transform:translateX(-50%) scale(1);} 50%{transform:translateX(-50%) scale(1.2);} }
.hero-title { font-size: 1.7em; font-weight: 800; letter-spacing: 2px; margin-bottom: 4px; }
.hero-subtitle { font-size: .8em; color: var(--text-lighter); margin-bottom: 10px; }

/* ===== TAB PANELS ===== */
.tab-panel { display: none; position: relative; z-index: 1; }
.tab-panel.active { display: block; animation: fadeIn .3s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }

/* ===== CARDS ===== */
.card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
  border: 1px solid rgba(255,255,255,.06);
}
.card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.card-header h2 { font-size: 1em; font-weight: 700; }
.card-header .badge { font-size: .7em; padding: 4px 10px; border-radius: 10px; background: rgba(255,255,255,.08); color: var(--text-light); }

/* ----- LOVE TIMER ----- */
.love-timer-card {
  background: linear-gradient(135deg, #e91e63, #c2185b); border: none;
  text-align: center; padding: 22px 20px;
}
.love-timer-card .label { font-size: .82em; opacity: .85; margin-bottom: 6px; }
.love-timer-card .timer {
  font-size: 2em; font-weight: 800; letter-spacing: 2px;
  font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
}
.love-timer-card .timer .unit { font-size: .42em; font-weight: 400; opacity: .8; margin: 0 2px; }
.love-progress { margin-top: 12px; }
.love-progress-bar { height: 5px; background: rgba(255,255,255,.25); border-radius: 3px; overflow: hidden; margin-bottom: 4px; }
.love-progress-fill { height: 100%; background: #fff; border-radius: 3px; transition: width .5s; }
.love-progress-label { font-size: .7em; opacity: .8; }

/* ----- ANNIVERSARY ----- */
.anni-card { text-align: center; }
.anni-illustration { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 14px; }
.anni-people { font-size: 44px; }
.anni-umbrella { font-size: 32px; }
.anni-highlight { display: inline-block; padding: 12px 24px; background: linear-gradient(135deg, rgba(233,30,99,.2), rgba(233,30,99,.08)); border-radius: 50px; margin: 6px 0; }
.anni-highlight .num { font-size: 1.8em; font-weight: 800; color: var(--pink); }
.anni-highlight .txt { font-size: .75em; color: var(--text-light); }
.anni-date { color: var(--text-lighter); font-size: .8em; margin-top: 4px;
}

/* ===== WEATHER ===== */
.weather-top { display: flex; align-items: center; gap: 14px; margin-bottom: 10px; }
.weather-icon { font-size: 2.6em; }
.weather-main-info { flex: 1; }
.weather-temp { font-size: 2em; font-weight: 300; line-height: 1; }
.weather-desc { font-size: .82em; color: var(--text-lighter); }
.weather-detail { display: flex; gap: 14px; font-size: .78em; color: var(--text-lighter); margin-bottom: 10px; }
.clothing-tip { padding: 12px 14px; background: rgba(255,167,38,.1); border-radius: var(--radius-sm); font-size: .82em; border: 1px solid rgba(255,167,38,.15); }
.clothing-tip .cloth-row { display:flex; align-items:center; gap:8px; margin:3px 0; }
.weather-city-row { display:flex; gap:8px; margin-top:10px; }
.weather-city-row input { flex:1; padding:9px 12px; border-radius:8px; border:1px solid rgba(255,255,255,.1); background:rgba(255,255,255,.05); color:#fff; font-size:.85em; }
.weather-city-row input::placeholder { color:#555; }
.weather-city-row button { padding:9px 16px; border-radius:8px; border:none; background:var(--pink); color:#fff; font-size:.85em; cursor:pointer; }

/* ===== WEIGHT ===== */
.weight-dual { display: flex; gap: 12px; }
.weight-person-card { flex:1; padding:14px; border-radius:var(--radius-sm); text-align:center; }
.weight-person-card.male { background:rgba(79,195,247,.08); }
.weight-person-card.female { background:rgba(233,30,99,.08); }
.weight-person-card .w-name { font-size:.82em; color:var(--text-light); margin-bottom:4px; }
.weight-person-card .w-val { font-size:1.5em; font-weight:700; }
.weight-person-card.male .w-val { color:var(--blue); }
.weight-person-card.female .w-val { color:var(--pink); }
.weight-person-card .w-unit { font-size:.48em; font-weight:400; opacity:.7; }
.weight-person-card .w-bmi { font-size:.76em; color:var(--text-lighter); margin-top:3px; }
.weight-input-row { display:flex; gap:8px; margin-top:12px; }
.weight-input-row input { flex:1; padding:9px 12px; border-radius:8px; border:1px solid rgba(255,255,255,.1); background:rgba(255,255,255,.05); color:#fff; font-size:.85em; }
.weight-input-row select { padding:9px 10px; border-radius:8px; border:1px solid rgba(255,255,255,.1); background:rgba(255,255,255,.05); color:#fff; font-size:.85em; }
.weight-input-row button { padding:9px 16px; border-radius:8px; border:none; background:var(--pink); color:#fff; font-size:.85em; cursor:pointer; }

/* ===== TODO ===== */
.todo-item { display:flex; align-items:center; gap:12px; padding:10px 0; }
.todo-item + .todo-item { border-top:1px solid rgba(255,255,255,.04); }
.todo-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
.todo-dot.male { background:var(--blue); box-shadow:0 0 6px var(--blue); }
.todo-dot.female { background:var(--pink); box-shadow:0 0 6px var(--pink); }
.todo-text { flex:1; font-size:.88em; }
.todo-item.done .todo-text { text-decoration:line-through; color:var(--text-lighter); }
.todo-cb { width:20px; height:20px; border-radius:6px; border:2px solid #555; appearance:none; cursor:pointer; flex-shrink:0; position:relative; }
.todo-cb:checked { background:var(--pink); border-color:var(--pink); }
.todo-cb:checked::after { content:'✓'; position:absolute; top:-2px; left:3px; color:#fff; font-size:13px; font-weight:700; }
.todo-del { background:none; border:none; color:#555; cursor:pointer; font-size:1em; padding:4px; }
.todo-del:hover { color:#e53935; }
.todo-input-row { display:flex; gap:8px; margin-top:12px; }
.todo-input-row select { padding:9px 10px; border-radius:8px; border:1px solid rgba(255,255,255,.1); background:rgba(255,255,255,.05); color:#fff; font-size:.85em; }
.todo-input-row input { flex:1; padding:9px 12px; border-radius:8px; border:1px solid rgba(255,255,255,.1); background:rgba(255,255,255,.05); color:#fff; font-size:.85em; }
.todo-input-row input::placeholder { color:#555; }
.todo-input-row button { padding:9px 16px; border-radius:8px; border:none; background:var(--pink); color:#fff; font-size:.85em; cursor:pointer; }

/* ===== MESSAGES ===== */
.messages-list { max-height:340px; overflow-y:auto; }
.msg-date-sep { text-align:center; color:var(--text-lighter); font-size:.72em; padding:8px 0; position:relative; }
.msg-date-sep::before, .msg-date-sep::after { content:''; position:absolute; top:50%; width:28%; height:1px; background:rgba(255,255,255,.08); }
.msg-date-sep::before { left:0; }
.msg-date-sep::after { right:0; }
.msg-bubble { max-width:82%; padding:10px 20px 10px 14px; border-radius:16px; margin-bottom:8px; font-size:.85em; position:relative; }
.msg-bubble.male { background:rgba(79,195,247,.15); margin-right:auto; border-bottom-left-radius:4px; }
.msg-bubble.female { background:rgba(233,30,99,.15); margin-left:auto; border-bottom-right-radius:4px; text-align:right; }
.msg-bubble .author { font-size:.68em; opacity:.6; margin-bottom:2px; }
.msg-input-row { display:flex; gap:8px; margin-top:12px; }
.msg-input-row select { padding:9px 10px; border-radius:8px; border:1px solid rgba(255,255,255,.1); background:rgba(255,255,255,.05); color:#fff; font-size:.85em; }
.msg-input-row input { flex:1; padding:9px 12px; border-radius:8px; border:1px solid rgba(255,255,255,.1); background:rgba(255,255,255,.05); color:#fff; font-size:.85em; }
.msg-input-row input::placeholder { color:#555; }
.msg-input-row button { padding:9px 16px; border-radius:8px; border:none; background:var(--pink); color:#fff; font-size:.85em; cursor:pointer; }

/* ===== PERIOD ===== */
.period-top { display:flex; align-items:center; gap:16px; margin-bottom:14px; }
.period-ring { width:80px; height:80px; border-radius:50%; flex-shrink:0; position:relative; display:flex; align-items:center; justify-content:center; }
.period-ring-inner { width:60px; height:60px; border-radius:50%; background:var(--card-bg); display:flex; align-items:center; justify-content:center; flex-direction:column; }
.period-ring-inner .days { font-size:1.3em; font-weight:700; }
.period-ring-inner .sub { font-size:.58em; color:var(--text-lighter); }
.period-info { flex:1; }
.period-info .status { font-weight:700; font-size:.9em; margin-bottom:3px; }
.period-input-row { display:flex; gap:8px; margin-top:12px; }
.period-input-row input { flex:1; padding:9px 12px; border-radius:8px; border:1px solid rgba(255,255,255,.1); background:rgba(255,255,255,.05); color:#fff; font-size:.85em; color-scheme:dark; }
.period-input-row button { padding:9px 16px; border-radius:8px; border:none; background:var(--pink); color:#fff; font-size:.85em; cursor:pointer; }
.period-history { margin-top:10px; }
.ph-item { display:flex; justify-content:space-between; font-size:.78em; padding:3px 0; color:var(--text-lighter); }

/* ===== BOTTOM NAV ===== */
.bottom-nav {
  position: fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:480px;
  height:var(--nav-h);
  background:rgba(26,26,46,.95); backdrop-filter:blur(20px);
  border-top:1px solid rgba(255,255,255,.06);
  display:flex; align-items:center; justify-content:space-around;
  z-index:100; padding:0 4px;
}
.nav-item {
  display:flex; flex-direction:column; align-items:center; gap:3px;
  background:none; border:none; color:var(--text-lighter);
  font-size:.65em; cursor:pointer; padding:8px 6px;
  transition:color .2s; min-width:52px;
}
.nav-item .nav-icon { font-size:1.5em; transition:transform .2s; }
.nav-item.active { color:var(--pink); }
.nav-item.active .nav-icon { transform:scale(1.15); }
.nav-item:active .nav-icon { transform:scale(.9); }

/* ===== MODAL ===== */
.modal-overlay { display:none; position:fixed; inset:0; z-index:200; background:rgba(0,0,0,.7); justify-content:center; align-items:center; }
.modal-overlay.show { display:flex; }
.modal { background:#252540; border-radius:var(--radius); padding:26px; max-width:400px; width:90%; max-height:85vh; overflow-y:auto; border:1px solid rgba(255,255,255,.1); color:#fff; }
.modal h2 { margin-bottom:18px; font-size:1.1em; }
.form-group { margin-bottom:13px; }
.form-group label { display:block; font-size:.78em; color:var(--text-lighter); margin-bottom:3px; }
.form-group input { width:100%; padding:10px 12px; border-radius:8px; border:1px solid rgba(255,255,255,.1); background:rgba(255,255,255,.05); color:#fff; font-size:.88em; }
.modal button[type=submit] { width:100%; padding:12px; background:var(--pink); color:#fff; border:none; border-radius:8px; font-size:.9em; cursor:pointer; margin-top:2px; }
.modal .close-btn { float:right; background:none; border:none; font-size:1.2em; cursor:pointer; color:#888; line-height:1; }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-thumb { background:rgba(255,255,255,.08); border-radius:2px; }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="app">

  <!-- Header -->
  <div class="header-bar">
    <div class="title"><span class="pink">Love</span> Story</div>
    <div style="display:flex;align-items:center;gap:10px;">
      <span id="syncDot" style="width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.3);flex-shrink:0;" title="同步状态"></span>
      <button class="settings-btn" onclick="openSettings()">⚙</button>
    </div>
  </div>

  <!-- ===== TAB: 首页 ===== -->
  <div class="tab-panel active" id="tab-home">
    <div class="hero show">
      <div class="hero-moon"></div>
      <div class="hero-avatars">
        <span class="hero-avatar left">👦</span>
        <span class="hero-heart">💕</span>
        <span class="hero-avatar right">👧</span>
      </div>
      <p class="hero-subtitle">我们的点点滴滴</p>
    </div>
    <div class="card love-timer-card">
      <div class="label">💗 我们已经相爱了</div>
      <div class="timer" id="loveTimer">--</div>
      <div class="love-progress">
        <div class="love-progress-bar"><div class="love-progress-fill" id="loveProgressFill" style="width:0%"></div></div>
        <div class="love-progress-label" id="loveProgressLabel">恋爱ing</div>
      </div>
    </div>
    <div class="card anni-card">
      <div class="card-header"><h2>💍 纪念日</h2></div>
      <div class="anni-illustration">
        <span class="anni-people">👦</span>
        <span class="anni-umbrella">☂️</span>
        <span class="anni-people">👧</span>
      </div>
      <div class="anni-highlight">
        <div class="num" id="anniDays">--</div>
        <div class="txt">天</div>
      </div>
      <div class="anni-date" id="anniDate"></div>
    </div>
  </div>

  <!-- ===== TAB: 天气 ===== -->
  <div class="tab-panel" id="tab-weather">
    <div class="card" id="weatherCard0">
      <div class="card-header"><h2>🌤 <span id="weatherCityLabel0">我的天气</span></h2></div>
      <div id="weatherContent0">
        <div class="weather-city-row">
          <input type="text" class="cityInput0" placeholder="输入城市名...">
          <button onclick="fetchWeatherByCity(0)">查询</button>
        </div>
      </div>
    </div>
    <div class="card" id="weatherCard1" style="margin-top:12px;">
      <div class="card-header"><h2>🌤 <span id="weatherCityLabel1">她的天气</span></h2></div>
      <div id="weatherContent1">
        <div class="weather-city-row">
          <input type="text" class="cityInput1" placeholder="输入城市名...">
          <button onclick="fetchWeatherByCity(1)">查询</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== TAB: 体重 ===== -->
  <div class="tab-panel" id="tab-weight">
    <div class="card">
      <div class="card-header"><h2>⚖️ 体重记录</h2></div>
      <div class="weight-dual" id="weightDual"></div>
      <canvas id="weightChart" style="width:100%;height:200px;margin-top:12px;border-radius:12px;"></canvas>
      <div class="weight-history" id="weightHistory" style="margin-top:12px;max-height:160px;overflow-y:auto;"></div>
      <div class="weight-input-row">
        <input type="number" id="weightInput" placeholder="体重(kg)" step="0.1">
        <select id="weightPerson"></select>
        <button onclick="addWeight()">记录</button>
      </div>
    </div>
  </div>

  <!-- ===== TAB: 待办 ===== -->
  <div class="tab-panel" id="tab-todo">
    <div class="card">
      <div class="card-header">
        <h2>📋 TODO 清单</h2>
        <span class="badge" id="todoCount">0项</span>
      </div>
      <div id="todoList"></div>
      <div class="todo-input-row">
        <select id="todoPerson"></select>
        <input type="text" id="todoInput" placeholder="添加待办...">
        <button onclick="addTodo()">＋</button>
      </div>
    </div>
  </div>

  <!-- ===== TAB: 留言 ===== -->
  <div class="tab-panel" id="tab-messages">
    <div class="card">
      <div class="card-header"><h2>💬 留言板</h2></div>
      <div class="messages-list" id="messagesList"></div>
      <div class="msg-input-row">
        <select id="msgAuthor"></select>
        <input type="text" id="msgInput" placeholder="说点什么...">
        <button onclick="addMessage()">发送</button>
      </div>
    </div>
  </div>

  <!-- ===== TAB: 经期 ===== -->
  <div class="tab-panel" id="tab-period">
    <div class="card">
      <div class="card-header"><h2>📅 经期记录</h2></div>
      <div class="period-top" id="periodTop"></div>
      <div class="period-input-row">
        <input type="date" id="periodDate">
        <button onclick="addPeriod()">记录开始</button>
      </div>
      <div class="period-history" id="periodHistory"></div>
    </div>
  </div>

</div>

<!-- ===== BOTTOM NAV ===== -->
<nav class="bottom-nav">
  <button class="nav-item active" data-tab="home">
    <span class="nav-icon">🏠</span>首页
  </button>
  <button class="nav-item" data-tab="weather">
    <span class="nav-icon">🌤</span>天气
  </button>
  <button class="nav-item" data-tab="weight">
    <span class="nav-icon">⚖️</span>体重
  </button>
  <button class="nav-item" data-tab="todo">
    <span class="nav-icon">📋</span>待办
  </button>
  <button class="nav-item" data-tab="messages">
    <span class="nav-icon">💬</span>留言
  </button>
  <button class="nav-item" data-tab="period">
    <span class="nav-icon">📅</span>经期
  </button>
</nav>

<!-- ===== SETTINGS MODAL ===== -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <button class="close-btn" onclick="closeSettings()">✕</button>
    <h2>⚙ 设置</h2>
    <form onsubmit="saveSettings(event)">
      <div class="form-group"><label>张众的名字</label><input type="text" id="setName0" required></div>
      <div class="form-group"><label>刘笑的名字</label><input type="text" id="setName1" required></div>
      <div class="form-group"><label>张众的身高 (cm)</label><input type="number" id="setHeight0" min="100" max="250" required></div>
      <div class="form-group"><label>刘笑的身高 (cm)</label><input type="number" id="setHeight1" min="100" max="250" required></div>
      <div class="form-group"><label>在一起的日子</label><input type="date" id="setAnniversary" required></div>
      <div class="form-group"><label>例假周期 (天)</label><input type="number" id="setCycleDays" min="20" max="45" value="28"></div>
      <div class="form-group"><label>张众的城市</label><input type="text" id="setCity0" placeholder="如：北京"></div>
      <div class="form-group"><label>刘笑的城市</label><input type="text" id="setCity1" placeholder="如：上海"></div>
      <button type="submit">保存设置</button>
    </form>
  </div>
</div>

<script>
// ============ DATA ============
const STORAGE_KEY = 'love-dashboard-data';
function loadData() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) return JSON.parse(raw);
  return {
    names: ['张众', '刘笑'],
    heights: [175, 165],
    anniversary: '2025-01-15',
    weights: [],
    periods: [],
    cycleDays: 28,
    messages: [],
    todos: [],
    cities: ['', ''],
    todoIdCounter: 0
  };
}
let D = loadData();
if (D.names[0] === '我' && D.names[1] === '女友') { D.names = ['张众', '刘笑']; saveData(D); }
function persist() { saveData(D); }
function saveData(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); pushToFirebase(); }

// ============ FIREBASE SYNC ============
const FB_URL = 'https://love-dashboard-2fd19-default-rtdb.firebaseio.com/data.json';
let FB_VERSION = 0;
let SYNCING = false;

async function pushToFirebase() {
  if (SYNCING) return;
  try {
    D._version = (D._version || 0) + 1;
    D._updated = Date.now();
    await fetch(FB_URL, { method: 'PUT', body: JSON.stringify(D), headers: { 'Content-Type': 'application/json' } });
    FB_VERSION = D._version;
    markOnline();
  } catch(e) { /* offline, ignore */ }
}

async function pullFromFirebase() {
  try {
    const resp = await fetch(FB_URL);
    if (!resp.ok) return;
    const remote = await resp.json();
    if (!remote || !remote._version) return;
    const rv = remote._version || 0;
    if (rv > FB_VERSION) {
      SYNCING = true;
      FB_VERSION = rv;
      D = remote;
      persist();
      // re-render all
      refreshAll();
      SYNCING = false;
    }
  } catch(e) { /* offline */ }
}

function startSync() {
  setInterval(pullFromFirebase, 3000);
  pushToFirebase();
}

function refreshAll() {
  updateTimer();
  updateSelects();
  renderWeights();
  renderPeriod();
  renderMessages();
  renderTodos();
}

function markOnline() {
  const el = document.getElementById('syncDot');
  if (el) el.style.background = '#4caf50';
  setTimeout(() => { if (el) el.style.background = 'rgba(255,255,255,.3)'; }, 800);
}

function updateSelects() {
  ['todoPerson', 'msgAuthor', 'weightPerson'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = `<option value="0">👦 ${D.names[0]}</option><option value="1">👧 ${D.names[1]}</option>`;
  });
}

// ============ HELPERS ============
function fmtDate(d) { const dd = new Date(d); return `${dd.getFullYear()}-${String(dd.getMonth()+1).padStart(2,'0')}-${String(dd.getDate()).padStart(2,'0')}`; }
function todayStr() { return fmtDate(new Date()); }
function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ============ STARS ============
function initStars() {
  let html = '';
  for (let i = 0; i < 60; i++) {
    const x = Math.random()*100, y = Math.random()*100, s = Math.random()*2+1, delay = Math.random()*2;
    html += `<div class="star" style="left:${x}%;top:${y}%;width:${s}px;height:${s}px;animation-delay:${delay}s;"></div>`;
  }
  document.getElementById('stars').innerHTML = html;
}

// ============ TAB NAVIGATION ============
function switchTab(name) {
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.querySelector('.nav-item[data-tab="'+name+'"]').classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  // redraw chart when switching to weight tab
  if (name === 'weight') setTimeout(drawWeightChart, 50);
}

document.querySelectorAll('.nav-item').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

// ============ TIMER ============
function updateTimer() {
  const start = new Date(D.anniversary + 'T00:00:00');
  const now = new Date();
  if (isNaN(start.getTime())) { document.getElementById('loveTimer').textContent = '请设置纪念日'; return; }
  let diff = Math.floor((now - start) / 1000);
  if (diff < 0) { document.getElementById('loveTimer').textContent = '即将开始 💕'; return; }
  const sec = diff % 60; diff = Math.floor(diff / 60);
  const min = diff % 60; diff = Math.floor(diff / 60);
  const hr = diff % 24; diff = Math.floor(diff / 24);
  const day = diff;
  document.getElementById('loveTimer').innerHTML = `${day}<span class="unit">天</span> ${String(hr).padStart(2,'0')}<span class="unit">时</span> ${String(min).padStart(2,'0')}<span class="unit">分</span> ${String(sec).padStart(2,'0')}<span class="unit">秒</span>`;
  const milestone = Math.ceil(day / 100) * 100;
  const prevMilestone = Math.floor(day / 100) * 100;
  const progress = prevMilestone === milestone ? 100 : Math.round((day - prevMilestone) / (milestone - prevMilestone) * 100);
  document.getElementById('loveProgressFill').style.width = progress + '%';
  document.getElementById('loveProgressLabel').textContent = `距${milestone}天还有${milestone - day}天 · 恋爱ing`;
  document.getElementById('anniDays').textContent = day;
  document.getElementById('anniDate').textContent = `在一起 · ${D.anniversary}`;
}

// ============ WEATHER ============
function renderWeatherLabels() {
  document.getElementById('weatherCityLabel0').textContent = '🌤 ' + (D.names[0] || '我') + '的天气';
  document.getElementById('weatherCityLabel1').textContent = '🌤 ' + (D.names[1] || '她') + '的天气';
}

async function fetchWeatherByCity(p) {
  const input = document.querySelector('.cityInput' + p);
  const city = (input?.value || '').trim();
  if (!city) return;
  D.cities[p] = city; persist();
  document.querySelectorAll('.cityInput' + p).forEach(el => { el.value = city; });
  try {
    const geoResp = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=zh`);
    const geoData = await geoResp.json();
    if (geoData.results?.length) { fetchWeatherData(p, geoData.results[0].latitude, geoData.results[0].longitude); }
    else { renderWeatherError(p, '未找到城市'); }
  } catch(e) { renderWeatherError(p, '查询失败'); }
}

async function fetchWeatherData(p, lat, lon) {
  try {
    const resp = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto&forecast_days=1`);
    const data = await resp.json();
    renderWeather(p, data);
  } catch(e) { renderWeatherError(p, '获取天气失败'); }
}

function getClothingAdvice(temp, code) {
  const rainy = [51,53,55,61,63,65,80,81,82,95,96,99].includes(code);
  if (temp < 0) return { top: '厚羽绒服 / 加厚棉衣', bottom: '加绒裤 / 棉裤', acc: '围巾🧣 + 手套🧤 + 帽子🎩', extra: rainy ? '🌂 带伞' : '' };
  if (temp < 5) return { top: '羽绒服 / 棉服', bottom: '厚长裤 / 加绒裤', acc: '围巾🧣 + 手套🧤', extra: rainy ? '🌂 带伞' : '' };
  if (temp < 10) return { top: '厚外套 / 呢大衣', bottom: '长裤 / 牛仔裤', acc: '围巾🧣', extra: rainy ? '🌂 带伞' : '' };
  if (temp < 15) return { top: '薄外套 / 风衣 / 夹克', bottom: '长裤', acc: '可备薄围巾', extra: rainy ? '🌂 带伞' : '' };
  if (temp < 20) return { top: '长袖T恤 / 薄卫衣', bottom: '长裤 / 长裙', acc: '随身带薄外套', extra: rainy ? '🌂 带伞' : '' };
  if (temp < 25) return { top: '短袖 / 衬衫', bottom: '薄长裤 / 半身裙 / 连衣裙', acc: '', extra: rainy ? '🌂 带伞' : '' };
  if (temp < 30) return { top: '短袖 / 吊带', bottom: '短裤 / 短裙', acc: '🧴 注意防晒', extra: rainy ? '🌂 带伞' : '' };
  return { top: '轻薄短袖 / 背心', bottom: '短裤 / 薄裙', acc: '🧴 防晒霜 + 遮阳伞', extra: rainy ? '🌂 带伞' : '' };
}

function renderWeather(p, data) {
  const cw = data.current_weather, daily = data.daily;
  const temp = Math.round(cw.temperature), code = cw.weathercode;
  const map = {0:['☀️','晴天'],1:['🌤','大部晴'],2:['⛅','多云'],3:['☁️','阴天'],45:['🌫','雾'],48:['🌫','雾凇'],51:['🌦','小雨'],53:['🌦','小雨'],55:['🌦','小雨'],61:['🌧','小雨'],63:['🌧','中雨'],65:['🌧','大雨'],71:['❄️','小雪'],73:['❄️','中雪'],75:['❄️','大雪'],80:['🌦','阵雨'],81:['🌧','阵雨'],82:['🌧','大阵雨'],85:['❄️','小雪'],86:['❄️','大雪'],95:['⛈','雷暴'],96:['⛈','雷暴冰雹'],99:['⛈','雷暴冰雹']};
  const [icon, desc] = map[code] || ['🌡','--'];
  const cloth = getClothingAdvice(temp, code);
  document.getElementById('weatherContent'+p).innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
      <span style="font-weight:600;">📍 ${escHtml(D.cities[p])}</span>
      <span style="font-size:.72em;color:var(--text-lighter);">${todayStr()}</span>
    </div>
    <div class="weather-top">
      <div class="weather-icon">${icon}</div>
      <div class="weather-main-info"><div class="weather-temp">${temp}°C</div><div class="weather-desc">${desc}</div></div>
    </div>
    <div class="weather-detail"><span>💨 ${cw.windspeed} km/h</span><span>🌡 ${Math.round(daily.temperature_2m_max[0])}° / ${Math.round(daily.temperature_2m_min[0])}°</span></div>
    <div class="clothing-tip">
      <div style="font-weight:600;margin-bottom:6px;">👗 今日穿搭</div>
      <div class="cloth-row">👕 上衣：${cloth.top}</div>
      <div class="cloth-row">👖 下装：${cloth.bottom}</div>
      ${cloth.acc ? `<div class="cloth-row">🎒 配饰：${cloth.acc}</div>` : ''}
      ${cloth.extra ? `<div class="cloth-row">${cloth.extra}</div>` : ''}
    </div>
    <div class="weather-city-row" style="margin-top:10px;">
      <input type="text" class="cityInput${p}" placeholder="更换城市...">
      <button onclick="fetchWeatherByCity(${p})">查询</button>
    </div>`;
}

function renderWeatherError(p, msg) {
  document.getElementById('weatherContent'+p).innerHTML = `
    <div style="color:var(--text-lighter);margin-bottom:8px;">${msg}</div>
    <div class="weather-city-row">
      <input type="text" class="cityInput${p}" placeholder="输入城市名...">
      <button onclick="fetchWeatherByCity(${p})">查询</button>
    </div>`;
}

function initWeather() {
  renderWeatherLabels();
  [0,1].forEach(p => {
    if (D.cities[p]) { fetchWeatherByCity2(p, D.cities[p]); }
    else if (p === 0 && navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        pos => fetchWeatherData(p, pos.coords.latitude, pos.coords.longitude),
        () => {}
      );
    }
  });
}

// Helper: search city by name for a specific person
async function fetchWeatherByCity2(p, cityName) {
  const city = cityName.trim();
  if (!city) return;
  D.cities[p] = city; persist();
  document.querySelectorAll('.cityInput' + p).forEach(el => { el.value = city; });
  try {
    const geoResp = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=zh`);
    const geoData = await geoResp.json();
    if (geoData.results?.length) { fetchWeatherData(p, geoData.results[0].latitude, geoData.results[0].longitude); }
    else { renderWeatherError(p, '未找到城市'); }
  } catch(e) { renderWeatherError(p, '查询失败'); }
}

// ============ WEIGHT ============
function calcBMI(weight, heightCm) { const h = heightCm/100; return (weight/(h*h)).toFixed(1); }
function bmiCategory(bmi) { const v = parseFloat(bmi); if (v < 18.5) return '偏瘦'; if (v < 24) return '正常'; if (v < 28) return '偏胖'; return '肥胖'; }

function renderWeights() {
  const latest = [null, null];
  for (let i = D.weights.length-1; i >=0; i--) { const w = D.weights[i]; if (latest[w.person]===null) latest[w.person] = w; }
  document.getElementById('weightDual').innerHTML = ['male','female'].map((cls, p) => {
    const w = latest[p], name = D.names[p], h = D.heights[p];
    if (!w) return `<div class="weight-person-card ${cls}"><div class="w-name">${name}</div><div class="w-val">--<span class="w-unit">kg</span></div><div class="w-bmi">暂无记录</div></div>`;
    const bmi = calcBMI(w.weight, h);
    return `<div class="weight-person-card ${cls}"><div class="w-name">${name}</div><div class="w-val">${w.weight}<span class="w-unit">kg</span></div><div class="w-bmi">BMI ${bmi} · ${bmiCategory(bmi)}</div></div>`;
  }).join('');
  // history list
  const hist = D.weights.slice().sort((a,b) => b.date.localeCompare(a.date)).slice(0, 15);
  document.getElementById('weightHistory').innerHTML = hist.length === 0 ? '<div style="color:var(--text-lighter);font-size:.78em;text-align:center;padding:8px;">暂无记录</div>' :
    hist.map(w => {
      const name = D.names[w.person] || (w.person === 0 ? '张众' : '刘笑');
      const color = w.person === 0 ? 'var(--blue)' : 'var(--pink)';
      return `<div style="display:flex;align-items:center;gap:10px;padding:5px 0;font-size:.8em;border-bottom:1px solid rgba(255,255,255,.04);">
        <span style="color:${color};font-weight:600;">${name}</span>
        <span>${w.weight}kg</span>
        <span style="color:var(--text-lighter);flex:1;">${w.date}</span>
        <button onclick="deleteWeight(${w.id||0})" style="background:none;border:none;color:#e53935;cursor:pointer;font-size:.85em;padding:2px 6px;">撤回</button>
      </div>`;
    }).join('');
  drawWeightChart();
}

function drawWeightChart() {
  const canvas = document.getElementById('weightChart');
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = 200 * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const W = rect.width, H = 200;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(255,255,255,.02)';
  ctx.fillRect(0, 0, W, H);

  const w0 = D.weights.filter(w => w.person === 0).slice(-30);
  const w1 = D.weights.filter(w => w.person === 1).slice(-30);
  const all = [...w0.map(w => ({...w})), ...w1.map(w => ({...w}))];
  all.sort((a,b) => a.date.localeCompare(b.date));

  if (all.length < 2) {
    ctx.fillStyle = 'rgba(255,255,255,.2)';
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('记录两条以上体重数据后显示曲线', W/2, H/2);
    return;
  }

  let minW = Infinity, maxW = -Infinity;
  all.forEach(w => { if (w.weight < minW) minW = w.weight; if (w.weight > maxW) maxW = w.weight; });
  const pad = Math.max((maxW - minW) * 0.3, 3);
  minW = Math.floor(minW - pad); maxW = Math.ceil(maxW + pad);

  const padL = 36, padR = 16, padT = 14, padB = 28;
  const pw = W - padL - padR, ph = H - padT - padB;

  function xOf(d) {
    for (let i = 0; i < all.length; i++) {
      if (all[i].date === d) return padL + (i / Math.max(all.length - 1, 1)) * pw;
    }
    return padL;
  }
  function yOf(v) { return padT + ph - ((v - minW) / (maxW - minW)) * ph; }

  ctx.strokeStyle = 'rgba(255,255,255,.06)'; ctx.lineWidth = .5;
  for (let i = 0; i < 5; i++) {
    const v = minW + (maxW - minW) * i / 4;
    const y = yOf(v);
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(W - padR, y); ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,.3)'; ctx.font = '10px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText(Math.round(v), padL - 6, y + 3);
  }

  const step = Math.max(1, Math.floor(all.length / 5));
  ctx.textAlign = 'center'; ctx.fillStyle = 'rgba(255,255,255,.3)'; ctx.font = '9px sans-serif';
  for (let i = 0; i < all.length; i += step) {
    ctx.fillText(all[i].date.slice(5), xOf(all[i].date), H - 6);
  }
  if (all.length > 1) {
    const last = all[all.length-1];
    ctx.fillText(last.date.slice(5), xOf(last.date), H - 6);
  }

  [0, 1].forEach(p => {
    const pts = all.filter(a => a.person === p);
    if (pts.length < 2) return;
    const color = p === 0 ? '#4fc3f7' : '#e91e63';
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    ctx.beginPath();
    pts.forEach((pt, i) => {
      const x = xOf(pt.date), y = yOf(pt.weight);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.stroke();
    pts.forEach(pt => {
      const x = xOf(pt.date), y = yOf(pt.weight);
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(x, y, 3.5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#1e1e36';
      ctx.beginPath(); ctx.arc(x, y, 2, 0, Math.PI*2); ctx.fill();
    });
  });

  ctx.font = '11px sans-serif';
  [{name: D.names[0], color: '#4fc3f7'}, {name: D.names[1], color: '#e91e63'}].forEach((l, i) => {
    const lx = padL + i * 90;
    ctx.fillStyle = l.color;
    ctx.beginPath(); ctx.arc(lx + 4, 12, 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,.6)';
    ctx.textAlign = 'left';
    ctx.fillText(l.name, lx + 12, 15);
  });
}

function addWeight() {
  const weight = parseFloat(document.getElementById('weightInput').value);
  const person = parseInt(document.getElementById('weightPerson').value);
  if (!weight || weight < 20 || weight > 300) { alert('请输入有效体重（20-300kg）'); return; }
  D.weights.push({ person, weight, date: todayStr(), id: Date.now() });
  persist(); renderWeights();
  document.getElementById('weightInput').value = '';
}

function deleteWeight(id) {
  D.weights = D.weights.filter(w => w.id !== id);
  persist(); renderWeights();
}

// ============ PERIOD ============
function predictNext(periods, cycleDays) {
  if (periods.length === 0) return null;
  let avgCycle = cycleDays;
  if (periods.length >= 2) {
    let sum = 0, count = 0;
    for (let i = 1; i < Math.min(periods.length, 4); i++) {
      const diff = Math.round((new Date(periods[i-1].date) - new Date(periods[i].date)) / 86400000);
      if (diff > 15 && diff < 60) { sum += diff; count++; }
    }
    if (count > 0) avgCycle = Math.round(sum / count);
  }
  const next = new Date(periods[0].date);
  next.setDate(next.getDate() + avgCycle);
  return { date: next, cycleDays: avgCycle };
}

function renderPeriod() {
  D.periods.sort((a,b) => new Date(b.date) - new Date(a.date));
  const prediction = predictNext(D.periods, D.cycleDays);
  const today = new Date(); today.setHours(0,0,0,0);
  let topHtml = '';
  let onPeriod = false, daysUntil = 0;

  if (D.periods.length > 0) {
    const daysSince = Math.floor((today - new Date(D.periods[0].date)) / 86400000);
    if (daysSince >= 0 && daysSince < 5) onPeriod = true;
  }

  if (onPeriod) {
    const dayOf = Math.floor((today - new Date(D.periods[0].date)) / 86400000) + 1;
    topHtml = `<div class="period-ring" style="background:conic-gradient(#ef5350 ${dayOf/5*100}%, transparent 0);"><div class="period-ring-inner"><div class="days" style="color:#ef5350;">D${dayOf}</div><div class="sub">经期中</div></div></div><div class="period-info"><div class="status" style="color:#ef5350;">🔴 经期中</div><div style="font-size:.78em;color:var(--text-lighter);">注意保暖，多喝热水</div></div>`;
  } else if (prediction) {
    daysUntil = Math.floor((prediction.date - today) / 86400000);
    const nextDate = fmtDate(prediction.date);
    if (daysUntil <= 3) {
      topHtml = `<div class="period-ring" style="background:conic-gradient(#ffa726 ${(D.cycleDays-daysUntil)/D.cycleDays*100}%, transparent 0);"><div class="period-ring-inner"><div class="days" style="color:#ffa726;">${daysUntil}</div><div class="sub">天后</div></div></div><div class="period-info"><div class="status" style="color:#ffa726;">🟡 即将到来</div><div style="font-size:.78em;color:var(--text-lighter);">预计 ${nextDate} · 提前准备</div></div>`;
    } else {
      topHtml = `<div class="period-ring" style="background:conic-gradient(#66bb6a ${(D.cycleDays-daysUntil)/D.cycleDays*100}%, transparent 0);"><div class="period-ring-inner"><div class="days" style="color:#66bb6a;">${daysUntil}</div><div class="sub">天后</div></div></div><div class="period-info"><div class="status" style="color:#66bb6a;">🟢 安全期</div><div style="font-size:.78em;color:var(--text-lighter);">下次 ${nextDate} · 周期${prediction.cycleDays}天</div></div>`;
    }
  } else {
    topHtml = `<div style="color:var(--text-lighter);">暂无记录，请添加例假日期</div>`;
  }
  document.getElementById('periodTop').innerHTML = topHtml;
  document.getElementById('periodHistory').innerHTML = D.periods.slice(0, 6).map(p => `<div class="ph-item"><span>${p.date}</span><span style="display:flex;align-items:center;gap:8px;">开始 <button onclick="deletePeriod('${p.date}')" style="background:none;border:none;color:#e53935;cursor:pointer;font-size:.85em;">撤回</button></span></div>`).join('');
}

function addPeriod() {
  const date = document.getElementById('periodDate').value;
  if (!date) { alert('请选择日期'); return; }
  if (D.periods.some(p => p.date === date)) { alert('该日期已记录'); return; }
  D.periods.push({ date });
  persist(); renderPeriod();
  document.getElementById('periodDate').value = '';
}

function deletePeriod(date) {
  D.periods = D.periods.filter(p => p.date !== date);
  persist(); renderPeriod();
}

// ============ MESSAGES ============
function renderMessages() {
  const list = document.getElementById('messagesList');
  if (D.messages.length === 0) { list.innerHTML = '<div style="color:#555;text-align:center;padding:30px;">💌 还没有留言</div>'; return; }
  const msgs = D.messages.slice(-30).reverse();
  let html = '', lastDate = '';
  msgs.forEach((m, idx) => {
    const mid = m.id || idx;
    if (m.date !== lastDate) { html += `<div class="msg-date-sep">${m.date}</div>`; lastDate = m.date; }
    html += `<div class="msg-bubble ${m.person===0?'male':'female'}">
      <div class="author">${D.names[m.person]}</div>${escHtml(m.text)}
      <button onclick="deleteMessage(${mid})" style="position:absolute;top:2px;right:4px;background:none;border:none;color:rgba(255,255,255,.3);cursor:pointer;font-size:.7em;padding:1px 4px;">✕</button>
    </div>`;
  });
  list.innerHTML = html;
}

let MSG_ID = Date.now();
function addMessage() {
  const text = document.getElementById('msgInput').value.trim();
  const person = parseInt(document.getElementById('msgAuthor').value);
  if (!text) return;
  D.messages.push({ person, text, date: todayStr(), id: ++MSG_ID });
  persist(); renderMessages();
  document.getElementById('msgInput').value = '';
}

function deleteMessage(id) {
  D.messages = D.messages.filter(m => m.id !== id);
  persist(); renderMessages();
}

// ============ TODOS ============
function renderTodos() {
  const active = D.todos.filter(t => !t.done).length;
  document.getElementById('todoCount').textContent = active + '项';
  if (D.todos.length === 0) { document.getElementById('todoList').innerHTML = '<div style="color:#555;text-align:center;padding:20px;">📝 暂无待办</div>'; return; }
  const sorted = [...D.todos].sort((a,b) => (a.done?1:0) - (b.done?1:0));
  document.getElementById('todoList').innerHTML = sorted.map(t => {
    const cls = t.person === 0 ? 'male' : 'female';
    return `<div class="todo-item${t.done?' done':''}">
      <input type="checkbox" class="todo-cb" ${t.done?'checked':''} onchange="toggleTodo(${t.id})">
      <span class="todo-dot ${cls}"></span><span class="todo-text">${escHtml(t.text)}</span>
      <button class="todo-del" onclick="deleteTodo(${t.id})">✕</button></div>`;
  }).join('');
}

function addTodo() {
  const text = document.getElementById('todoInput').value.trim();
  const person = parseInt(document.getElementById('todoPerson').value);
  if (!text) return;
  D.todos.push({ person, text, done:false, id: ++D.todoIdCounter });
  persist(); renderTodos();
  document.getElementById('todoInput').value = '';
}
function toggleTodo(id) { const t = D.todos.find(x => x.id===id); if (t) { t.done = !t.done; persist(); renderTodos(); } }
function deleteTodo(id) { D.todos = D.todos.filter(x => x.id!==id); persist(); renderTodos(); }

// ============ SETTINGS ============
function openSettings() {
  document.getElementById('setName0').value = D.names[0];
  document.getElementById('setName1').value = D.names[1];
  document.getElementById('setHeight0').value = D.heights[0];
  document.getElementById('setHeight1').value = D.heights[1];
  document.getElementById('setAnniversary').value = D.anniversary;
  document.getElementById('setCycleDays').value = D.cycleDays;
  document.getElementById('setCity0').value = D.cities[0];
  document.getElementById('setCity1').value = D.cities[1];
  document.getElementById('settingsModal').classList.add('show');
}
function closeSettings() { document.getElementById('settingsModal').classList.remove('show'); }
function saveSettings(e) {
  e.preventDefault();
  D.names[0] = document.getElementById('setName0').value.trim() || '张众';
  D.names[1] = document.getElementById('setName1').value.trim() || '刘笑';
  D.heights[0] = parseInt(document.getElementById('setHeight0').value) || 175;
  D.heights[1] = parseInt(document.getElementById('setHeight1').value) || 165;
  D.anniversary = document.getElementById('setAnniversary').value;
  D.cycleDays = parseInt(document.getElementById('setCycleDays').value) || 28;
  D.cities[0] = document.getElementById('setCity0').value.trim();
  D.cities[1] = document.getElementById('setCity1').value.trim();
  persist(); closeSettings();
  updateSelects(); updateTimer(); renderWeights(); renderMessages(); renderTodos(); renderPeriod();
  renderWeatherLabels();
  [0,1].forEach(p => { if (D.cities[p]) fetchWeatherData(p); });
}

// ============ KEYBOARD ============
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.activeElement === document.getElementById('msgInput')) addMessage();
    else if (document.activeElement === document.getElementById('todoInput')) addTodo();
  }
});
document.getElementById('settingsModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeSettings(); });

// ============ INIT ============
function init() {
  initStars();
  updateTimer();
  setInterval(updateTimer, 1000);
  initWeather();
  updateSelects();
  renderWeights();
  renderPeriod();
  renderMessages();
  renderTodos();
  document.getElementById('periodDate').value = todayStr();
  startSync();
}
init();
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(() => console.log('SW registered'));
}
</script>
</body>
</html>
